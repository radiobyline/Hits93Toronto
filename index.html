<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Hits 93 Toronto is an independent Toronto internet radio station streaming live worldwide 24/7 with current hits, pop, and dance favourites."
    />
    <meta
      name="keywords"
      content="Hits 93 Toronto, Toronto radio, internet radio, live radio, pop music, dance music, recently played, program schedule"
    />
    <meta name="robots" content="index,follow,max-image-preview:large,max-snippet:-1,max-video-preview:-1" />
    <meta name="author" content="Hits 93 Toronto" />
    <meta name="theme-color" content="#0e2342" />
    <meta name="color-scheme" content="dark light" />

    <script>
      (function () {
        try {
          var storageKey = "hits93toronto:theme";
          var stored = localStorage.getItem(storageKey);
          var theme =
            stored === "dark" || stored === "light"
              ? stored
              : window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches
                ? "dark"
                : "light";
          document.documentElement.setAttribute("data-theme", theme);
          document.documentElement.classList.add("preload");
        } catch (e) {
          // no-op
        }
      })();
    </script>
    <style>
      html,
      body {
        background: #eff4fb;
      }
      html[data-theme="dark"],
      html[data-theme="dark"] body {
        background: #07172b;
        color: #e6f0fd;
      }
      html.preload *,
      html.preload *::before,
      html.preload *::after {
        transition: none !important;
      }
    </style>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Source+Sans+3:wght@400;500;600;700&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Source+Sans+3:wght@400;500;600;700&display=swap"
      />
    </noscript>

    <link rel="canonical" href="https://hits93.com/#/" />

    <link rel="icon" type="image/png" sizes="192x192" href="./branding/hits93-social-avatar.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="./branding/hits93-social-avatar.png" />
