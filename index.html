<!doctype html>
<html lang="en-CA">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Hits 93 Toronto is an independent Toronto internet radio station streaming live worldwide 24/7 with current hits, pop, and dance favourites."
    />
    <meta
      name="keywords"
      content="Hits 93 Toronto, Toronto radio, internet radio, live radio, pop music, dance music, recently played, program schedule"
    />
    <meta name="robots" content="index,follow,max-image-preview:large,max-snippet:-1,max-video-preview:-1" />
    <meta name="author" content="Hits 93 Toronto" />
    <meta name="theme-color" content="#0e2342" />
    <meta name="color-scheme" content="dark light" />

    <script>
      (function () {
        var storageKey = "hits93toronto:theme";
        var theme = "light";
        var storedTheme = null;
        try {
          storedTheme = localStorage.getItem(storageKey);
        } catch (e) {
          storedTheme = null;
        }

        if (storedTheme === "dark" || storedTheme === "light") {
          theme = storedTheme;
        } else {
          try {
            theme =
              window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches
                ? "dark"
                : "light";
          } catch (e) {
            theme = "light";
          }
        }

        document.documentElement.setAttribute("data-theme", theme);
        document.documentElement.classList.add("preload");
        document.documentElement.style.setProperty("--boot-artwork", "url('./default-artwork.png')");

        // Seed initial paint with last-known now playing metadata/artwork to avoid placeholder flashes.
        var cacheKey = "hits93toronto:nowPlaying";
        var raw = null;
        try {
          raw = sessionStorage.getItem(cacheKey);
        } catch (e) {
          raw = null;
        }
        if (!raw) {
          try {
            raw = localStorage.getItem(cacheKey);
          } catch (e) {
            raw = null;
          }
        }
        if (raw) {
          try {
            var payload = JSON.parse(raw);
            var current = payload && payload.current;
            if (current && typeof current === "object") {
              if (typeof current.title === "string") {
                document.documentElement.setAttribute("data-boot-title", current.title);
              }
              if (typeof current.artist === "string") {
                document.documentElement.setAttribute("data-boot-artist", current.artist);
              }
              if (typeof current.artworkUrl === "string" && current.artworkUrl) {
                var abs = current.artworkUrl;
                try {
                  abs = new URL(abs, window.location.href).toString();
                } catch (e) {
                  // keep original
                }
                // Escape single quotes for CSS url('...') usage.
                var safe = abs.replace(/'/g, \"%27\");
                document.documentElement.style.setProperty("--boot-artwork", \"url('\" + safe + \"')\");
              }
            }
          } catch (e) {
            // no-op
          }
        }
      })();
    </script>
    <style>
      html,
      body {
        background: #eff4fb;
      }
      html[data-theme="dark"],
      html[data-theme="dark"] body {
        background: #07172b;
        color: #e6f0fd;
      }
      html.preload *,
      html.preload *::before,
      html.preload *::after {
        transition: none !important;
      }
    </style>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Source+Sans+3:wght@400;500;600;700&display=swap"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Source+Sans+3:wght@400;500;600;700&display=swap"
      />
    </noscript>

    <link rel="canonical" href="https://hits93.com/#/" />
    <link rel="icon" type="image/png" sizes="32x32" href="./branding/hits93-social-icon.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="./branding/hits93-social-avatar.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="./branding/hits93-social-avatar.png" />

    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Hits 93 Toronto" />
    <meta property="og:locale" content="en_CA" />
    <meta property="og:title" content="Hits 93 Toronto | Listen Live" />
    <meta
      property="og:description"
      content="Listen live to Hits 93 Toronto: 24/7 worldwide stream with current hits, pop, dance, and curated program blocks."
    />
    <meta property="og:url" content="https://hits93.com/#/" />
    <meta property="og:image" content="https://hits93.com/branding/hits93-og-1200x630.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:image:alt" content="Hits 93 Toronto Listen Live 24/7 Worldwide Stream" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@Hits93Toronto" />
    <meta name="twitter:creator" content="@Hits93Toronto" />
    <meta name="twitter:title" content="Hits 93 Toronto | Listen Live" />
    <meta
      name="twitter:description"
      content="Listen live to Hits 93 Toronto: 24/7 worldwide stream with current hits, pop, dance, and curated program blocks."
    />
    <meta name="twitter:image" content="https://hits93.com/branding/hits93-og-1200x630.jpg" />

    <title>Hits 93 Toronto | Listen Live</title>
  </head>
  <body>
    <div id="boot-overlay" aria-hidden="true">
      <div class="boot-shell">
        <div class="boot-shell__header" role="presentation"></div>
        <div class="boot-shell__body container container--hero">
          <section class="boot-hero" aria-label="Loading player">
            <div class="boot-hero__art" role="presentation"></div>
            <div class="boot-hero__meta">
              <p class="boot-hero__overline">Streaming Worldwide From Toronto</p>
              <strong class="boot-hero__title" id="boot-title">Hits 93 Toronto</strong>
              <span class="boot-hero__artist" id="boot-artist">Loading now playing...</span>
            </div>
          </section>
        </div>
      </div>
    </div>
    <script>
      (function () {
        try {
          var title = document.documentElement.getAttribute("data-boot-title");
          var artist = document.documentElement.getAttribute("data-boot-artist");
          var titleNode = document.getElementById("boot-title");
          var artistNode = document.getElementById("boot-artist");
          if (titleNode && title) titleNode.textContent = title;
          if (artistNode && artist) artistNode.textContent = artist;
        } catch (e) {
          // no-op
        }
      })();
    </script>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
